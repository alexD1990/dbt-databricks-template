name: 'your_project' # change: project name
config-version: 2
version: '0.1'
profile: 'your_project' # change: project name

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
analysis-paths: ["analyses"]
macro-paths: ["macros"]
target-path: "target"

clean-targets:
  - "target"
  - "dbt_packages"
  - "logs"

require-dbt-version: [">=1.0.0", "<2.0.0"]

models:
  your_project: # change: project name
    staging:
      +materialized: view
    prep:
      +materialized: table
      +post-hook: # change: add/remove macros as needed
        - "{{ optimize_table(this) }}"
        - "{{ change_ownership(this) }}"
    mart:
      +materialized: table
      +post-hook: # change: add/remove macros as needed
        - "{{ optimize_table(this) }}"
        - "{{ change_ownership(this) }}"
